<!DOCTYPE html>
<html th:lang="${#locale.language}" th:dir="#{language.direction}" th:data-language="${#locale.toString()}"
  xmlns:th="https://www.thymeleaf.org">

<head>
  <th:block th:insert="~{fragments/common :: head(title=#{split.title}, header=#{split.header})}"></th:block>
  <link rel="stylesheet" th:href="@{'/css/theme/theme.css'}">
  <link rel="stylesheet" th:href="@{'/css/theme/componentes.css'}">
</head>

<body>
  <div id="page-container">
    <div id="content-wrap">
      <th:block th:insert="~{fragments/navbar.html :: navbar}"></th:block>
      
      <main class="md-main">
        <div class="container">
          <div class="md-card">
            <div class="md-card-header">
              <span class="material-symbols-rounded md-icon">content_cut</span>
              <h1 class="md-title" th:text="#{split.header}"></h1>
            </div>

            <div class="md-card-content">
              <form th:action="@{'/api/v1/general/split-pages'}" method="post" enctype="multipart/form-data" class="md-form">
                
                <!-- File Input Section -->
                <div class="md-file-drop-zone" id="dropZone">
                  <div class="md-file-drop-zone-content">
                    <span class="material-symbols-rounded md-icon">upload_file</span>
                    <div class="md-file-drop-title" th:text="#{common.dragAndDrop}"></div>
                    <div class="md-file-drop-subtitle" th:text="#{common.or}"></div>
                    <label class="md-button md-button--filled">
                      <span th:text="#{common.browse}"></span>
                      <input type="file" name="fileInput" accept="application/pdf" required hidden>
                    </label>
                  </div>
                </div>
                <div class="md-file-list" id="fileList" style="display: none;">
                  <div class="md-file-item">
                    <span class="material-symbols-rounded md-icon">description</span>
                    <span class="md-file-name"></span>
                    <button type="button" class="md-button md-button--icon" id="removeFile">
                      <span class="material-symbols-rounded">close</span>
                    </button>
                  </div>
                </div>

                <!-- Page Numbers Input -->
                <div class="md-text-field md-text-field--filled">
                  <label class="md-text-field__label" for="pageNumbers" th:text="#{split.splitPages}"></label>
                  <input type="text" class="md-text-field__input" id="pageNumbers" name="pageNumbers" 
                         placeholder="1,3,5-10" required>
                  <div class="md-text-field__bottom-line"></div>
                </div>

                <!-- Info Section -->
                <div class="md-expansion-panel">
                  <button type="button" class="md-expansion-panel__header" data-bs-toggle="collapse" data-bs-target="#info" aria-expanded="false" aria-controls="info">
                    <span class="material-symbols-rounded md-icon">info</span>
                    <span th:text="#{info}"></span>
                    <span class="material-symbols-rounded md-icon md-expansion-panel__icon">expand_more</span>
                  </button>
                  <div class="collapse md-expansion-panel__content" id="info">
                    <div class="md-expansion-panel__body">
                      <p class="md-text-body" th:text="#{split.desc.1}"></p>
                      <p class="md-text-body" th:text="#{split.desc.2}"></p>
                      <p class="md-text-body" th:text="#{split.desc.3}"></p>
                      <p class="md-text-body" th:text="#{split.desc.4}"></p>
                      <p class="md-text-body" th:text="#{split.desc.5}"></p>
                      <p class="md-text-body" th:text="#{split.desc.6}"></p>
                      <p class="md-text-body" th:text="#{split.desc.7}"></p>
                      <p class="md-text-body" th:text="#{split.desc.8}"></p>
                    </div>
                  </div>
                </div>

                <!-- Submit Button -->
                <button type="submit" id="submitBtn" class="md-button md-button--filled md-button--primary">
                  <span class="material-symbols-rounded">send</span>
                  <span th:text="#{split.submit}"></span>
                </button>
              </form>
            </div>
          </div>
        </div>
      </main>

      <th:block th:insert="~{fragments/footer.html :: footer}"></th:block>
    </div>
  </div>

  <!-- Scripts -->
  <script th:src="@{'/js/material-theme.js'}"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const dropZone = document.getElementById('dropZone');
      const fileList = document.getElementById('fileList');
      const fileInput = document.querySelector('input[type="file"]');
      const removeFileBtn = document.getElementById('removeFile');
      
      // Drag and drop functionality
      dropZone.addEventListener('dragover', (e) => {
        e.preventDefault();
        dropZone.classList.add('md-file-drop-zone--active');
      });
      
      dropZone.addEventListener('dragleave', () => {
        dropZone.classList.remove('md-file-drop-zone--active');
      });
      
      dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.classList.remove('md-file-drop-zone--active');
        
        if (e.dataTransfer.files.length) {
          fileInput.files = e.dataTransfer.files;
          showFileDetails(e.dataTransfer.files[0]);
        }
      });
      
      fileInput.addEventListener('change', (e) => {
        if (e.target.files.length) {
          showFileDetails(e.target.files[0]);
        }
      });
      
      removeFileBtn.addEventListener('click', () => {
        fileInput.value = '';
        fileList.style.display = 'none';
        dropZone.style.display = 'block';
      });
      
      function showFileDetails(file) {
        dropZone.style.display = 'none';
        fileList.querySelector('.md-file-name').textContent = file.name;
        fileList.style.display = 'block';
      }

      // Ripple effect for buttons
      document.querySelectorAll('.md-button').forEach(button => {
        button.addEventListener('click', function(e) {
          const ripple = document.createElement('span');
          const rect = button.getBoundingClientRect();
          
          ripple.className = 'md-ripple';
          ripple.style.left = `${e.clientX - rect.left}px`;
          ripple.style.top = `${e.clientY - rect.top}px`;
          
          button.appendChild(ripple);
          
          ripple.addEventListener('animationend', () => {
            ripple.remove();
          });
        });
      });
    });
  </script>
  <script th:src="@{'/js/pages/split-pdfs.js'}"></script>
</body>
</html>
