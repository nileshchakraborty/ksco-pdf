<!DOCTYPE html>
<html th:lang="${#locale.language}" th:dir="#{language.direction}" th:data-language="${#locale.toString()}" xmlns:th="https://www.thymeleaf.org">
  <head>
    <th:block th:insert="~{fragments/common :: head(title=#{sanitizePDF.title}, header=#{sanitizePDF.header})}"></th:block>
  </head>

  <body>
    <div id="page-container">
      <div id="content-wrap">
        <th:block th:insert="~{fragments/navbar.html :: navbar}"></th:block>
        <div class="container mt-4">
          <div class="row justify-content-center">
            <div class="col-md-8">
              <md-card class="p-4">
                <div class="tool-header mb-4">
                  <md-icon class="tool-header-icon security">sanitizer</md-icon>
                  <span class="tool-header-text" th:text="#{sanitizePDF.header}"></span>
                </div>

                <form th:action="@{'api/v1/security/sanitize-pdf'}" method="post" enctype="multipart/form-data">
                  <md-filled-button class="file-input-button w-100 mb-4">
                    <label for="fileInput" class="w-100">
                      <span th:text="#{common.chooseFile}"></span>
                      <input type="file" class="d-none" id="fileInput" name="fileInput" required accept="application/pdf">
                    </label>
                  </md-filled-button>

                  <div id="fileDisplay" class="mb-4 d-none">
                    <md-chip-set>
                      <md-assist-chip id="selectedFile"></md-assist-chip>
                    </md-chip-set>
                  </div>

                  <div class="d-flex flex-column gap-3 mb-4">
                    <md-checkbox id="removeJavaScript" name="removeJavaScript" checked>
                      <span th:text="#{sanitizePDF.selectText.1}"></span>
                    </md-checkbox>

                    <md-checkbox id="removeEmbeddedFiles" name="removeEmbeddedFiles" checked>
                      <span th:text="#{sanitizePDF.selectText.2}"></span>
                    </md-checkbox>

                    <md-checkbox id="removeXMPMetadata" name="removeXMPMetadata">
                      <span th:text="#{sanitizePDF.selectText.3}"></span>
                    </md-checkbox>

                    <md-checkbox id="removeMetadata" name="removeMetadata">
                      <span th:text="#{sanitizePDF.selectText.6}"></span>
                    </md-checkbox>

                    <md-checkbox id="removeLinks" name="removeLinks">
                      <span th:text="#{sanitizePDF.selectText.4}"></span>
                    </md-checkbox>

                    <md-checkbox id="removeFonts" name="removeFonts">
                      <span th:text="#{sanitizePDF.selectText.5}"></span>
                    </md-checkbox>
                  </div>

                  <md-filled-button type="submit" id="submitBtn">
                    <span th:text="#{sanitizePDF.submit}"></span>
                  </md-filled-button>
                </form>
              </md-card>
            </div>
          </div>
        </div>
      </div>
      <th:block th:insert="~{fragments/footer.html :: footer}"></th:block>
    </div>

    <script>
      document.addEventListener('DOMContentLoaded', function() {
        const fileInput = document.getElementById('fileInput');
        const fileDisplay = document.getElementById('fileDisplay');
        const selectedFile = document.getElementById('selectedFile');

        fileInput.addEventListener('change', function() {
          if (this.files.length > 0) {
            fileDisplay.classList.remove('d-none');
            selectedFile.textContent = this.files[0].name;
          } else {
            fileDisplay.classList.add('d-none');
          }
        });
      });
    </script>
  </body>
</html>
