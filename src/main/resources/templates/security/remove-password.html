<!DOCTYPE html>
<html th:lang="${#locale.language}" th:dir="#{language.direction}" th:data-language="${#locale.toString()}" xmlns:th="https://www.thymeleaf.org">
  <head>
    <th:block th:insert="~{fragments/common :: head(title=#{removePassword.title}, header=#{removePassword.header})}"></th:block>
    <link rel="stylesheet" th:href="@{'/css/theme/theme.css'}">
    <link rel="stylesheet" th:href="@{'/css/theme/componentes.css'}">
  </head>

  <body>
    <div id="page-container">
      <div id="content-wrap">
        <th:block th:insert="~{fragments/navbar.html :: navbar}"></th:block>
        
        <main class="md-main">
          <div class="container">
            <div class="md-card">
              <div class="md-card-header">
                <span class="material-symbols-rounded md-icon">lock_open</span>
                <h1 class="md-title" th:text="#{removePassword.header}"></h1>
              </div>

              <div class="md-card-content">
                <form th:action="@{'api/v1/security/remove-password'}" method="post" enctype="multipart/form-data" class="md-form">
                  
                  <!-- File Upload Section -->
                  <div class="md-file-drop-zone" id="dropZone">
                    <div class="md-file-drop-zone-content">
                      <span class="material-symbols-rounded md-icon">upload_file</span>
                      <div class="md-file-drop-title" th:text="#{common.dragAndDrop}"></div>
                      <div class="md-file-drop-subtitle" th:text="#{common.or}"></div>
                      <label class="md-button md-button--filled">
                        <span th:text="#{common.browse}"></span>
                        <input type="file" name="fileInput" accept="application/pdf" required hidden>
                      </label>
                    </div>
                  </div>
                  <div class="md-file-list" id="fileList" style="display: none;">
                    <div class="md-file-item">
                      <span class="material-symbols-rounded md-icon">description</span>
                      <span class="md-file-name"></span>
                      <button type="button" class="md-button md-button--icon" id="removeFile">
                        <span class="material-symbols-rounded">close</span>
                      </button>
                    </div>
                  </div>

                  <!-- Password Field -->
                  <div class="md-text-field md-text-field--filled">
                    <input type="password" class="md-text-field__input" id="password" name="password" placeholder=" " required>
                    <label class="md-text-field__label" for="password" th:text="#{removePassword.selectText.2}"></label>
                    <div class="md-text-field__bottom-line"></div>
                  </div>

                  <!-- Submit Button -->
                  <button type="submit" id="submitBtn" class="md-button md-button--filled md-button--primary">
                    <span class="material-symbols-rounded">lock_open</span>
                    <span th:text="#{removePassword.submit}"></span>
                  </button>
                </form>
              </div>
            </div>
          </div>
        </main>
        
        <th:block th:insert="~{fragments/footer.html :: footer}"></th:block>
      </div>
    </div>

    <!-- Scripts -->
    <script th:src="@{'/js/material-theme.js'}"></script>
    <script th:src="@{'/js/pages/remove-password.js'}"></script>
  </body>
</html>
