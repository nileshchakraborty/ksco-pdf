<!DOCTYPE html>
<html th:lang="${#locale.language}" th:dir="#{language.direction}" th:data-language="${#locale.toString()}" xmlns:th="https://www.thymeleaf.org">
  <head>
    <th:block th:insert="~{fragments/common :: head(title=#{addPassword.title}, header=#{addPassword.header})}"></th:block>
    <link rel="stylesheet" th:href="@{'/css/theme/theme.css'}">
    <link rel="stylesheet" th:href="@{'/css/theme/componentes.css'}">
  </head>

  <body>
    <div id="page-container">
      <div id="content-wrap">
        <th:block th:insert="~{fragments/navbar.html :: navbar}"></th:block>
        
        <main class="md-main">
          <div class="container">
            <div class="md-card">
              <div class="md-card-header">
                <span class="material-symbols-rounded md-icon">enhanced_encryption</span>
                <h1 class="md-title" th:text="#{addPassword.header}"></h1>
              </div>

              <div class="md-card-content">
                <form th:action="@{'api/v1/security/add-password'}" method="post" enctype="multipart/form-data" class="md-form">
                  
                  <!-- File Upload Section -->
                  <div class="md-file-drop-zone" id="dropZone">
                    <div class="md-file-drop-zone-content">
                      <span class="material-symbols-rounded md-icon">upload_file</span>
                      <div class="md-file-drop-title" th:text="#{common.dragAndDrop}"></div>
                      <div class="md-file-drop-subtitle" th:text="#{common.or}"></div>
                      <label class="md-button md-button--filled">
                        <span th:text="#{common.browse}"></span>
                        <input type="file" name="fileInput" accept="application/pdf" required hidden>
                      </label>
                    </div>
                  </div>
                  <div class="md-file-list" id="fileList" style="display: none;">
                    <div class="md-file-item">
                      <span class="material-symbols-rounded md-icon">description</span>
                      <span class="md-file-name"></span>
                      <button type="button" class="md-button md-button--icon" id="removeFile">
                        <span class="material-symbols-rounded">close</span>
                      </button>
                    </div>
                  </div>

                  <!-- Password Fields -->
                  <div class="md-text-field md-text-field--filled">
                    <input type="password" class="md-text-field__input" id="ownerPassword" name="ownerPassword" placeholder=" ">
                    <label class="md-text-field__label" for="ownerPassword" th:text="#{addPassword.selectText.14}"></label>
                    <div class="md-text-field__helper-text" th:text="#{addPassword.selectText.15}"></div>
                    <div class="md-text-field__bottom-line"></div>
                  </div>

                  <div class="md-text-field md-text-field--filled">
                    <input type="password" class="md-text-field__input" id="password" name="password" placeholder=" ">
                    <label class="md-text-field__label" for="password" th:text="#{addPassword.selectText.2}"></label>
                    <div class="md-text-field__helper-text" th:text="#{addPassword.selectText.16}"></div>
                    <div class="md-text-field__bottom-line"></div>
                  </div>

                  <!-- Key Length Selection -->
                  <div class="md-select-field md-text-field--filled">
                    <label class="md-select-field__label" for="keyLength" th:text="#{addPassword.selectText.3}"></label>
                    <select class="md-select-field__input" id="keyLength" name="keyLength">
                      <option value="40">40</option>
                      <option value="128">128</option>
                      <option value="256">256</option>
                    </select>
                    <div class="md-text-field__helper-text" th:text="#{addPassword.selectText.4}"></div>
                    <div class="md-text-field__bottom-line"></div>
                  </div>

                  <!-- Permissions Group -->
                  <div class="md-form-group">
                    <label class="md-form-group__label" th:text="#{addPassword.selectText.5}"></label>
                    
                    <div class="md-checkbox">
                      <input type="checkbox" class="md-checkbox__input" id="preventAssembly" name="preventAssembly">
                      <label class="md-checkbox__label" for="preventAssembly" th:text="#{addPassword.selectText.6}"></label>
                    </div>

                    <div class="md-checkbox">
                      <input type="checkbox" class="md-checkbox__input" id="preventExtractContent" name="preventExtractContent">
                      <label class="md-checkbox__label" for="preventExtractContent" th:text="#{addPassword.selectText.7}"></label>
                    </div>

                    <div class="md-checkbox">
                      <input type="checkbox" class="md-checkbox__input" id="preventExtractForAccessibility" name="preventExtractForAccessibility">
                      <label class="md-checkbox__label" for="preventExtractForAccessibility" th:text="#{addPassword.selectText.8}"></label>
                    </div>

                    <div class="md-checkbox">
                      <input type="checkbox" class="md-checkbox__input" id="preventFillInForm" name="preventFillInForm">
                      <label class="md-checkbox__label" for="preventFillInForm" th:text="#{addPassword.selectText.9}"></label>
                    </div>

                    <div class="md-checkbox">
                      <input type="checkbox" class="md-checkbox__input" id="preventModify" name="preventModify">
                      <label class="md-checkbox__label" for="preventModify" th:text="#{addPassword.selectText.10}"></label>
                    </div>

                    <div class="md-checkbox">
                      <input type="checkbox" class="md-checkbox__input" id="preventModifyAnnotations" name="preventModifyAnnotations">
                      <label class="md-checkbox__label" for="preventModifyAnnotations" th:text="#{addPassword.selectText.11}"></label>
                    </div>

                    <div class="md-checkbox">
                      <input type="checkbox" class="md-checkbox__input" id="preventPrinting" name="preventPrinting">
                      <label class="md-checkbox__label" for="preventPrinting" th:text="#{addPassword.selectText.12}"></label>
                    </div>

                    <div class="md-checkbox">
                      <input type="checkbox" class="md-checkbox__input" id="preventPrintingFaithful" name="preventPrintingFaithful">
                      <label class="md-checkbox__label" for="preventPrintingFaithful" th:text="#{addPassword.selectText.13}"></label>
                    </div>
                  </div>

                  <!-- Submit Button -->
                  <button type="submit" id="submitBtn" class="md-button md-button--filled md-button--primary">
                    <span class="material-symbols-rounded">lock</span>
                    <span th:text="#{addPassword.submit}"></span>
                  </button>
                </form>
              </div>
            </div>
          </div>
        </main>
        
        <th:block th:insert="~{fragments/footer.html :: footer}"></th:block>
      </div>
    </div>

    <!-- Scripts -->
    <script th:src="@{'/js/material-theme.js'}"></script>
    <script th:src="@{'/js/pages/add-password.js'}"></script>
  </body>
</html>
